version: "3.9"

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot_data:/app/data
    networks:
      - backend
    depends_on:
      - redis
      - api-gateway

volumes:
  bot_data:

networks:
  backend:
    external: true
