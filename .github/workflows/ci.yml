name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

# ============================================================================
# Lint
# ============================================================================
jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            services/*/requirements*.txt
            services/knowledge-base/requirements/*.txt

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black==24.10.0 ruff==0.9.0 isort==5.13.2

      - name: Black (format check)
        run: black --check services/ shared/

      - name: Ruff (linter)
        run: ruff check services/ shared/ --output-format=github

      - name: isort (import ordering)
        run: isort --check-only services/ shared/

  # ============================================================================
  # Security
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: Install service requirements
        run: |
          pip install -r services/context-broker/requirements.txt
          pip install -r services/journal-parser/requirements.txt
          pip install -r services/knowledge-base/requirements/base.txt

      - name: pip-audit (dependency vulnerability scan)
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit --desc || true

      - name: Bandit (static security analysis)
        run: |
          bandit -r services/ shared/ \
            -f json \
            -o bandit-report.json \
            -ll \
            --exit-zero
          bandit -r services/ shared/ -ll -ii

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit-report.json
            bandit-report.json
          retention-days: 30

  # ============================================================================
  # Infrastructure file validation
  # ============================================================================
  validate-infrastructure:
    name: Validate Infrastructure Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          pip install yamllint

      - name: Shellcheck (shell scripts)
        run: find scripts/ -name "*.sh" -exec shellcheck -S warning {} +

      - name: Validate SQL scripts
        run: |
          grep -q "CREATE" infrastructure/database/init.sql \
            || { echo "ERROR: init.sql appears empty or invalid"; exit 1; }
          echo "SQL scripts validated"

      - name: YAMLlint (monitoring config)
        run: yamllint infrastructure/monitoring/prometheus.yml

      - name: Validate Kong configuration
        run: |
          test -f services/api-gateway/kong.yml \
            || { echo "ERROR: kong.yml missing"; exit 1; }
          python3 -c "import yaml; yaml.safe_load(open('services/api-gateway/kong.yml'))" \
            && echo "Kong YAML is valid"

  # ============================================================================
  # Docker image builds
  # ============================================================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - context-broker
          - journal-parser
          - knowledge-base
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          tags: plos-${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ============================================================================
  # Docker Compose validation
  # ============================================================================
  docker-compose-validation:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.dev.yml overlay
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.dev.yml \
            config --quiet

      - name: Check all service names are consistent
        run: docker compose -f docker-compose.yml config --services | sort

  # ============================================================================
  # Knowledge Base DB integration tests
  # ============================================================================
  knowledge-base-tests:
    name: Knowledge Base DB Tests
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: plos_db_secure_2025
      POSTGRES_DB: plos
      REDIS_PASSWORD: plos_redis_secure_2025
      MINIO_ROOT_USER: plos_minio_admin
      MINIO_ROOT_PASSWORD: plos_minio_secure_2026
      MINIO_BUCKET: knowledge-base-documents
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Knowledge Base DB tests
        run: bash scripts/test/knowledge-base-db-tests.sh

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kb-test-results
          path: .pytest_cache/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans 2>/dev/null || true

  # ============================================================================
  # Unit tests (no running services required)
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
          pip install -r services/context-broker/requirements.txt
          pip install -r services/journal-parser/requirements.txt
          pip install -r services/knowledge-base/requirements/base.txt
          pip install -r services/knowledge-base/requirements/test.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
          GEMINI_API_KEY: test_placeholder
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plos
        run: |
          pytest \
            tests/knowledge_base/test_deduplication_algorithms.py \
            tests/knowledge_base/test_semantic_chunking.py \
            -v \
            --tb=short \
            --timeout=60 \
            --no-header \
            2>&1 || true

  # ============================================================================
  # CI gate: required checks must all pass before merge
  # ============================================================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - validate-infrastructure
      - docker-build
      - docker-compose-validation
    if: always()
    steps:
      - name: Evaluate required job results
        run: |
          lint="${{ needs.lint.result }}"
          infra="${{ needs.validate-infrastructure.result }}"
          build="${{ needs.docker-build.result }}"
          compose="${{ needs.docker-compose-validation.result }}"

          failed=0

          if [ "$lint" != "success" ]; then
            echo "FAILED: lint ($lint)"
            failed=1
          else
            echo "OK:     lint"
          fi

          if [ "$infra" != "success" ]; then
            echo "FAILED: validate-infrastructure ($infra)"
            failed=1
          else
            echo "OK:     validate-infrastructure"
          fi

          if [ "$build" != "success" ]; then
            echo "FAILED: docker-build ($build)"
            failed=1
          else
            echo "OK:     docker-build"
          fi

          if [ "$compose" != "success" ]; then
            echo "FAILED: docker-compose-validation ($compose)"
            failed=1
          else
            echo "OK:     docker-compose-validation"
          fi

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "One or more required checks failed. Fix the issues above before merging."
            exit 1
          fi

          echo ""
          echo "All required checks passed."
