# ============================================================================
# PLOS Prometheus Configuration
# Production-ready metrics collection for all microservices
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'plos-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Recording and alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations for all services
scrape_configs:
  # ========================================================================
  # PROMETHEUS SELF-MONITORING
  # ========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # ========================================================================
  # CORE PLOS SERVICES
  # ========================================================================

  # Context Broker - Central state management
  - job_name: 'context-broker'
    static_configs:
      - targets: ['context-broker:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Journal Parser - AI-powered extraction
  - job_name: 'journal-parser'
    static_configs:
      - targets: ['journal-parser:8002']
    metrics_path: '/journal/metrics'
    scrape_interval: 10s

  # Knowledge Base - Document storage and retrieval
  - job_name: 'knowledge-base'
    static_configs:
      - targets: ['knowledge-base:8003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================================================
  # INFRASTRUCTURE MONITORING
  # ========================================================================

  # PostgreSQL metrics via postgres_exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: '/metrics'

  # Redis metrics via redis_exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: '/metrics'

  # Kafka metrics via kafka_exporter
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
    metrics_path: '/metrics'
